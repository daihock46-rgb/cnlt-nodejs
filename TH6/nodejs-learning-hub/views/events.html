<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝  File Log </title>
    <style>
        :root { --primary: #ff69b4; --secondary: #ffb6c1; --accent: #ff1493; --bg: #fff0f5; --text: #4a4a4a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; color: var(--text); }
        header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 2.5rem; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2); }
        h1 { margin: 0; font-size: 2.2em; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        nav { background: white; padding: 1rem; text-align: center; margin: -25px auto 20px; width: 70%; max-width: 600px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; z-index: 10; }
        nav a { color: var(--primary); text-decoration: none; margin: 0 15px; font-weight: bold; transition: color 0.3s; }
        nav a:hover { color: var(--accent); }
        .container { max-width: 800px; margin: 30px auto; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 5px 20px rgba(255, 182, 193, 0.3); }
        pre { background: white; color: var(--primary); padding: 20px; border-radius: 15px; border: 2px dashed var(--secondary); white-space: pre-wrap; line-height: 1.6; font-weight: bold;}
    </style>
</head>
<body>
    <header><h1>📝 File Log </h1>
                        <br><br><br>

    </header>
    <nav>
        <a href="/">🏠 Trang Chủ</a>
        <a href="/streams">🎀 Tạo Ghi Chú</a>
        <a href="/events">📝 File Log </a>
    </nav>
    <div class="container">
        <h2>Nhật ký hệ thống (EventEmitter)</h2>
        <pre id="log-container">Đang tải lịch sử sự kiện...</pre>
    </div>
    <script>
        fetch('/api/events')
            .then(res => res.text())
            .then(text => document.getElementById('log-container').innerText = text || "Chưa có hoạt động nào diễn ra 🌸.");
    </script>
</body>
</html>
