<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Ghi Chú Mới 🎀</title>
    <style>
        :root { --primary: #ff69b4; --secondary: #ffb6c1; --accent: #ff1493; --bg: #fff0f5; --text: #4a4a4a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; color: var(--text); }
        header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 2.5rem; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2); }
        h1 { margin: 0; font-size: 2.2em; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        
        nav { background: white; padding: 1rem; text-align: center; margin: -25px auto 20px; width: 70%; max-width: 600px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; z-index: 10; }
        nav a { color: var(--primary); text-decoration: none; margin: 0 15px; font-weight: bold; transition: color 0.3s; }
        nav a:hover { color: var(--accent); }
        
        .container { max-width: 600px; margin: 30px auto; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 5px 20px rgba(255, 182, 193, 0.3); }
        h2 { border-bottom: 2px dashed var(--secondary); padding-bottom: 10px; color: var(--primary); text-align: center; margin-top: 0;}
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary); }
        input[type="text"], textarea, input[type="file"] { width: 100%; padding: 12px; border: 2px solid #ffe4e1; border-radius: 10px; box-sizing: border-box; transition: 0.3s; font-family: inherit; }
        input[type="text"]:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 8px rgba(255, 105, 180, 0.2); }
        
        button { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; padding: 15px 20px; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: 0.3s; box-shadow: 0 4px 10px rgba(255, 20, 147, 0.3); }
        button:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(255, 20, 147, 0.4); }
        #status { margin-top: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>✍️ Thêm Ghi Chú Mới</h1>
                <br><br><br>

    </header>
    
    <nav>
        <a href="/">🏠 Trang Chủ</a>
        <a href="/streams">🎀 Tạo Ghi Chú</a>
        <a href="/events">🔔 Thông Báo</a>
    </nav>

    <div class="container">
        <h2>Viết gì đó thật hay nhé!</h2>
        <form id="noteForm">
            <div class="form-group">
                <label>Tiêu đề ghi chú:</label>
                <input type="text" id="title" required placeholder="Hôm nay mình cần nhớ gì ta?">
            </div>
            <div class="form-group">
                <label>Nội dung chi tiết:</label>
                <textarea id="content" rows="6" required placeholder="Ghi chú thật chi tiết vào đây nhé..."></textarea>
            </div>
            <div class="form-group">
                <label>Đính kèm một bức ảnh xinh xắn:</label>
                <input type="file" id="imageFile" accept="image/*" required>
            </div>
            <button type="submit">Lưu Ghi Chú 🌸</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('noteForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const fileInput = document.getElementById('imageFile');
            const statusDiv = document.getElementById('status');

            if (fileInput.files.length === 0) return alert("Vui lòng chọn một tấm ảnh!");

            const file = fileInput.files[0];
            const ext = file.name.split('.').pop(); 

            statusDiv.style.color = '#ff69b4';
            statusDiv.innerText = '⏳ Đang lưu ghi chú...';

            // Đọc file ảnh chuyển thành Base64
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64String = reader.result.split(',')[1]; 
                const payload = { title, content, imageBase64: base64String, ext };

                try {
                    const response = await fetch('/streams', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        statusDiv.style.color = '#2ecc71';
                        statusDiv.innerText = '✅ Đã lưu thành công! Hãy về Trang Chủ xem nhé.';
                        document.getElementById('noteForm').reset();
                    } else {
                        throw new Error('Lỗi Server');
                    }
                } catch (error) {
                    statusDiv.style.color = '#e74c3c';
                    statusDiv.innerText = '❌ Có lỗi xảy ra, thử lại sau nhé.';
                }
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
